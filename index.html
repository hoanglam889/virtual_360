<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360° Panorama Viewer | Premium Experience</title>
    
    <!-- Google Fonts: Inter & Outfit để có Typography hiện đại, sang trọng -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Nhúng thư viện Pannellum CSS từ CDN chính thức -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    
    <!-- Nhúng Style CSS tùy chỉnh đã được tách riêng (Thêm query param để tránh cache trình duyệt) -->
    <link rel="stylesheet" href="css/style.css?v=2.9">
</head>
<body>

    <div id="tour-container">
        
        <!-- 1. Màn hình Loading -->
        <div id="loading-overlay">
            <div class="loader-ring"></div>
            <div class="loader-text">Đang tải...</div>
        </div>

        <!-- 2. Khung chứa Pannellum Viewer -->
        <div id="panorama-viewer"></div>

        <!-- Trình xem sơ đồ 2D (Cho ảnh phẳng) -->
        <div id="viewer-2d" style="display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; overflow: hidden; background: #0b0f19; cursor: grab; z-index: 4;">
            <img id="img-2d" style="position: absolute; top: 0; left: 0; transform-origin: 0 0; user-drag: none; -webkit-user-drag: none; pointer-events: none;" src="" />
            <!-- Lớp SVG vẽ đa giác 2D phủ lên trên -->
            <svg id="svg-overlay-2d" style="position: absolute; top: 0; left: 0; transform-origin: 0 0; pointer-events: none; z-index: 5;">
                <polygon id="poly-san-bong" fill="rgba(0, 242, 254, 0.15)" stroke="#00f2fe" stroke-width="2.5" stroke-dasharray="6, 4" style="pointer-events: auto; cursor: pointer; transition: fill 0.3s, stroke 0.3s, stroke-width 0.3s, filter 0.3s; filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.6));" />
            </svg>
        </div>

        <!-- Lớp SVG vẽ đa giác highlight dự án phủ lên trên -->
        <svg id="tour-svg-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none;">
            <polygon id="poly-rach-chiec" fill="rgba(255, 8, 68, 0.05)" stroke="rgba(255, 8, 68, 0.5)" stroke-width="2" stroke-dasharray="6, 4" style="pointer-events: auto; cursor: pointer; transition: fill 0.3s, stroke 0.3s, stroke-width 0.3s, filter 0.3s; filter: drop-shadow(0 0 3px rgba(255, 8, 68, 0.3));" />
        </svg>

        <!-- Tooltip động khi di chuột vào đa giác -->
        <div id="poly-tooltip" style="position: absolute; display: none; background: rgba(15, 22, 36, 0.9); border: 1px solid #ff0844; color: #f8fafc; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; padding: 6px 12px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4); pointer-events: none; z-index: 100; transform: translate(-50%, -100%); opacity: 0; transition: opacity 0.2s ease;">
            Mặt bằng Rạch Chiếc
        </div>

        <!-- 3. Header & Info Overlay (Có tính năng đóng/mở linh hoạt) -->
        <div class="header-overlay" id="header-overlay">
            <!-- Nút đóng mở thông tin -->
            <button class="info-toggle-btn" id="info-toggle-btn" data-tooltip="Ẩn thông tin">
                <!-- Mặc định hiển thị dấu X (đóng) vì khi tải trang ở desktop sẽ mở rộng -->
                <svg id="info-toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="header-content" id="header-content">
                <h1>Ga Thủ Thiêm 360°</h1>
                <p>Trình xem ảnh toàn cảnh Panorama sống động và mượt mà tích hợp WebGL.</p>
                <div class="instruction-badge">
                    <!-- SVG Icon Mouse -->
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="5" y="2" width="14" height="20" rx="7" />
                        <line x1="12" y1="6" x2="12" y2="10" />
                    </svg>
                    <span id="instruction-text">Kéo để xoay / Cuộn để zoom</span>
                </div>
            </div>
        </div>

        <!-- 4. Thanh điều khiển tùy chỉnh (Custom Control Bar) -->
        <div class="controls-overlay">
            <!-- Nút Về Ga Thủ Thiêm -->
            <button class="home-btn" id="home-btn">
                <span>🏠 Về Ga Thủ Thiêm</span>
            </button>
            
            <div class="divider"></div>

            <!-- Nút Phóng To (Zoom In) -->
            <button class="ctrl-btn" id="zoom-in-btn" data-tooltip="Phóng to">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>

            <!-- Nút Thu Nhỏ (Zoom Out) -->
            <button class="ctrl-btn" id="zoom-out-btn" data-tooltip="Thu nhỏ">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>

            <div class="divider"></div>

            <!-- Nút Âm Thanh (Toggle Music) -->
            <button class="ctrl-btn" id="music-btn" data-tooltip="Bật thuyết minh">
                <svg id="music-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Biểu tượng loa tắt (Volume X) mặc định ban đầu -->
                    <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
                    <line x1="23" y1="9" x2="17" y2="15"></line>
                    <line x1="17" y1="9" x2="23" y2="15"></line>
                </svg>
            </button>

            <!-- Nút Tự Động Xoay (Toggle Auto-rotate) -->
            <button class="ctrl-btn" id="auto-rotate-btn" data-tooltip="Tự động quay">
                <svg id="rotate-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>

            <!-- Nút Toàn Màn Hình (Fullscreen) -->
            <button class="ctrl-btn" id="fullscreen-btn" data-tooltip="Toàn màn hình">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
            </button>
        </div>

        <!-- 5. Video Modal Popup -->
        <div id="video-modal" class="video-modal">
            <div class="video-modal-backdrop"></div>
            <div class="video-modal-content">
                <button class="video-modal-close" id="video-modal-close" data-tooltip="Đóng video">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
                <div class="video-responsive-container">
                    <iframe id="video-iframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                </div>
            </div>
        </div>

    </div>

    <!-- Nhúng thư viện Pannellum JS từ CDN chính thức -->
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <!-- Nhúng Script JS điều khiển đã được tách riêng (Thêm query param để tránh cache trình duyệt) -->
    <script src="js/script.js?v=2.8" defer></script>
</body>
</html>
